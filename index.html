<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Crossmate · Manager</title>
<meta name="robots" content="noindex,nofollow"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.0/Recharts.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0F0E0D;color:#E8E6DF;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#1A1917}::-webkit-scrollbar-thumb{background:#3A3835;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── DATOS REALES DE SUPABASE (11 Jun 2026) ──────────────────────────────────
const DATA = {
  updatedAt: '11 Jun 2026 · 10:30',
  kpis: {
    total_boxes: 58,
    total_users: 551,
    users_in_boxes: 402,
    total_logs: 8880,
    users_with_logs: 295,
    total_workouts: 177,
    total_plannings: 92,
    total_groups: 23,
    logs_30d: 7206,
    active_users_30d: 272,
    logs_7d: 2051,
    active_users_7d: 182,
  },
  weeklyLogs: [
    {w:'23 Mar',logs:46,users:3},{w:'30 Mar',logs:27,users:4},{w:'06 Abr',logs:508,users:34},
    {w:'13 Abr',logs:331,users:23},{w:'20 Abr',logs:188,users:16},{w:'27 Abr',logs:297,users:23},
    {w:'04 May',logs:92,users:5},{w:'11 May',logs:313,users:21},{w:'18 May',logs:1659,users:95},
    {w:'25 May',logs:1971,users:152},{w:'01 Jun',logs:1655,users:157},{w:'08 Jun',logs:1711,users:165},
  ],
  weeklyUsers: [
    {w:'16 Mar',n:2},{w:'23 Mar',n:7},{w:'30 Mar',n:4},{w:'06 Abr',n:95},{w:'13 Abr',n:10},
    {w:'20 Abr',n:23},{w:'27 Abr',n:8},{w:'04 May',n:6},{w:'11 May',n:22},
    {w:'18 May',n:75},{w:'25 May',n:145},{w:'01 Jun',n:41},{w:'08 Jun',n:80},
  ],
  weeklyPlannings: [
    {w:'06 Abr',n:2},{w:'13 Abr',n:8},{w:'20 Abr',n:9},{w:'27 Abr',n:3},{w:'04 May',n:1},
    {w:'11 May',n:10},{w:'18 May',n:12},{w:'25 May',n:19},{w:'01 Jun',n:5},{w:'08 Jun',n:4},
  ],
  boxes: [
    {name:'Crossfit La Forja',atletas:137,logs_total:4930,logs_30d:3398,users_30d:92,last:'2026-06-12',sem:'green'},
    {name:'BAI CrossFit',atletas:59,logs_total:1349,logs_30d:1335,users_30d:46,last:'2026-06-11',sem:'green'},
    {name:'Queiron CrossFit',atletas:119,logs_total:1181,logs_30d:1181,users_30d:85,last:'2026-06-11',sem:'green'},
    {name:'CrossFit la Catedral',atletas:38,logs_total:828,logs_30d:828,users_30d:21,last:'2026-06-11',sem:'green'},
    {name:'LGCY MSQD FIT CLUB',atletas:19,logs_total:442,logs_30d:400,users_30d:17,last:'2026-06-12',sem:'green'},
    {name:'Crossmate (interno)',atletas:8,logs_total:293,logs_30d:203,users_30d:6,last:'2026-06-12',sem:'green'},
    {name:'Wezone Crossfit',atletas:6,logs_total:236,logs_30d:194,users_30d:5,last:'2026-06-12',sem:'green'},
    {name:'Ironhawk Box',atletas:24,logs_total:325,logs_30d:159,users_30d:8,last:'2026-06-12',sem:'green'},
    {name:'MAD Festival',atletas:8,logs_total:281,logs_30d:135,users_30d:3,last:'2026-06-12',sem:'green'},
    {name:'Crossmate (test)',atletas:1,logs_total:47,logs_30d:33,users_30d:1,last:'2026-06-02',sem:'amber'},
    {name:'CrossFit Amara',atletas:1,logs_total:3,logs_30d:3,users_30d:1,last:'2026-06-03',sem:'amber'},
    {name:'Holanda',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'Prueba',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'Crossfit 321',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'Crococrosfit',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'CrossFit B23',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'Morgan',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'Ironhawk Vicálvaro',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'CrossFit sefaca',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'Crossfit Aure',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'La Alforja',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
    {name:'Mate',atletas:0,logs_total:0,logs_30d:0,users_30d:0,last:null,sem:'grey'},
  ],
};

const {useState,useMemo} = React;
const {BarChart,Bar,LineChart,Line,XAxis,YAxis,Tooltip,ResponsiveContainer,CartesianGrid,ComposedChart} = Recharts;

const C = {bg:'#0F0E0D',surface:'#171614',border:'#242220',muted:'#6B6B68',text:'#E8E6DF',sub:'#9CA3A0',accent:'#E8400C',green:'#4ADE80',amber:'#FBBF24',blue:'#60A5FA'};

function fmt(n){return n>=1000?(n/1000).toFixed(1)+'k':String(n)}
function pct(a,b){return b>0?Math.round(a/b*100)+'%':'0%'}
function fdate(s){if(!s)return'—';const d=new Date(s);return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'2-digit'})}

const ttStyle={background:'#1A1917',border:'1px solid #242220',borderRadius:6,fontSize:11,color:'#E8E6DF'};

function KPI({label,value,sub,color}){
  return React.createElement('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px'}},
    React.createElement('div',{style:{fontSize:26,fontWeight:700,letterSpacing:'-1px',color:color||C.text}},value),
    React.createElement('div',{style:{fontSize:11,color:C.muted,marginTop:4,textTransform:'uppercase',letterSpacing:'.5px'}},label),
    sub&&React.createElement('div',{style:{fontSize:11,color:C.sub,marginTop:2}},sub)
  );
}

function Pill({label,active,onClick}){
  return React.createElement('button',{
    onClick,
    style:{background:active?C.accent:C.surface,border:`1px solid ${active?C.accent:C.border}`,color:active?'#fff':C.sub,borderRadius:20,padding:'5px 14px',fontSize:12,cursor:'pointer'}
  },label);
}

function Dot({sem}){
  const color=sem==='green'?C.green:sem==='amber'?C.amber:C.muted;
  return React.createElement('span',{style:{width:8,height:8,borderRadius:'50%',background:color,display:'inline-block',marginRight:6}});
}

function App(){
  const [period,setPeriod]=useState(30);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('todos');

  const kpis=DATA.kpis;
  const logsP=period===7?kpis.logs_7d:period===30?kpis.logs_30d:kpis.total_logs;
  const usersP=period===7?kpis.active_users_7d:period===30?kpis.active_users_30d:kpis.users_with_logs;

  const filtered=useMemo(()=>DATA.boxes.filter(b=>{
    if(!b.name.toLowerCase().includes(search.toLowerCase()))return false;
    if(filter==='activos')return b.sem==='green';
    if(filter==='recientes')return b.sem==='amber';
    if(filter==='sin-actividad')return b.sem==='grey'&&b.atletas>0;
    if(filter==='vacios')return b.atletas===0;
    return true;
  }),[search,filter]);

  const section=(title,children)=>React.createElement('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:14}},
    React.createElement('div',{style:{fontSize:12,fontWeight:600,color:C.sub,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:14}},title),
    children
  );

  const th={textAlign:'left',padding:'8px 10px',color:C.muted,fontWeight:500,borderBottom:`1px solid ${C.border}`,fontSize:11,textTransform:'uppercase',letterSpacing:'.4px'};
  const td={padding:'9px 10px',borderBottom:'1px solid #1E1C1A',color:C.text,verticalAlign:'middle'};

  return React.createElement('div',{style:{background:C.bg,minHeight:'100vh',padding:'24px 16px'}},
    React.createElement('div',{style:{maxWidth:1100,margin:'0 auto'}},

      // Header
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}},
        React.createElement('div',null,
          React.createElement('div',{style:{fontSize:15,fontWeight:600,color:C.text,letterSpacing:'-.3px'}},'Crossmate · Manager interno'),
          React.createElement('div',{style:{fontSize:11,color:C.muted,marginTop:3}},`Datos: ${DATA.updatedAt}`)
        ),
        React.createElement('div',{style:{fontSize:11,color:C.muted,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'6px 12px'}},'Solo lectura · Supabase')
      ),

      // Pills
      React.createElement('div',{style:{display:'flex',gap:6,marginBottom:24}},
        React.createElement(Pill,{label:'7 días',active:period===7,onClick:()=>setPeriod(7)}),
        React.createElement(Pill,{label:'30 días',active:period===30,onClick:()=>setPeriod(30)}),
        React.createElement(Pill,{label:'Total',active:period===90,onClick:()=>setPeriod(90)}),
      ),

      // KPIs
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(155px,1fr))',gap:10,marginBottom:24}},
        React.createElement(KPI,{label:'Boxes',value:kpis.total_boxes}),
        React.createElement(KPI,{label:'Boxes activos',value:DATA.boxes.filter(b=>b.sem==='green').length,sub:'actividad ≤7d',color:C.green}),
        React.createElement(KPI,{label:'Atletas en boxes',value:fmt(kpis.users_in_boxes)}),
        React.createElement(KPI,{label:`Activos ${period===90?'total':period+'d'}`,value:usersP,sub:`${pct(usersP,kpis.users_in_boxes)} del total`,color:C.blue}),
        React.createElement(KPI,{label:'Logs totales',value:fmt(kpis.total_logs)}),
        React.createElement(KPI,{label:`Logs ${period===90?'total':period+'d'}`,value:fmt(logsP),color:C.accent}),
        React.createElement(KPI,{label:'Planificaciones',value:kpis.total_plannings}),
        React.createElement(KPI,{label:'Grupos',value:kpis.total_groups}),
      ),

      // Charts
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}},

        section('Logs + usuarios activos · 12 semanas',
          React.createElement(ResponsiveContainer,{width:'100%',height:165},
            React.createElement(ComposedChart,{data:DATA.weeklyLogs,margin:{top:0,right:0,left:-20,bottom:0}},
              React.createElement(CartesianGrid,{strokeDasharray:'3 3',stroke:C.border}),
              React.createElement(XAxis,{dataKey:'w',tick:{fill:C.muted,fontSize:10},axisLine:false,tickLine:false}),
              React.createElement(YAxis,{tick:{fill:C.muted,fontSize:10},axisLine:false,tickLine:false}),
              React.createElement(Tooltip,{contentStyle:ttStyle}),
              React.createElement(Bar,{dataKey:'logs',fill:C.accent,radius:[3,3,0,0],opacity:.85,name:'Logs'}),
              React.createElement(Line,{type:'monotone',dataKey:'users',stroke:C.blue,strokeWidth:2,dot:false,name:'Usuarios'}),
            )
          )
        ),

        section('Nuevos usuarios · 13 semanas',
          React.createElement(ResponsiveContainer,{width:'100%',height:165},
            React.createElement(BarChart,{data:DATA.weeklyUsers,margin:{top:0,right:0,left:-20,bottom:0}},
              React.createElement(CartesianGrid,{strokeDasharray:'3 3',stroke:C.border}),
              React.createElement(XAxis,{dataKey:'w',tick:{fill:C.muted,fontSize:10},axisLine:false,tickLine:false}),
              React.createElement(YAxis,{tick:{fill:C.muted,fontSize:10},axisLine:false,tickLine:false}),
              React.createElement(Tooltip,{contentStyle:ttStyle}),
              React.createElement(Bar,{dataKey:'n',fill:C.green,radius:[3,3,0,0],opacity:.85,name:'Nuevos usuarios'}),
            )
          )
        ),
      ),

      // Box table
      React.createElement('div',{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:14}},
        React.createElement('div',{style:{fontSize:12,fontWeight:600,color:C.sub,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12}},`Boxes (${filtered.length})`),
        React.createElement('div',{style:{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}},
          React.createElement('input',{
            style:{background:'#1A1917',border:`1px solid ${C.border}`,borderRadius:6,padding:'6px 10px',fontSize:12,color:C.text,outline:'none',flex:1,minWidth:160},
            placeholder:'Buscar box...',value:search,onChange:e=>setSearch(e.target.value)
          }),
          ['todos','activos','recientes','sin-actividad','vacios'].map(f=>
            React.createElement('button',{
              key:f,onClick:()=>setFilter(f),
              style:{background:filter===f?C.accent:C.surface,border:`1px solid ${filter===f?C.accent:C.border}`,color:filter===f?'#fff':C.sub,borderRadius:20,padding:'5px 12px',fontSize:11,cursor:'pointer',flex:'none'}
            },f)
          )
        ),
        React.createElement('div',{style:{overflowX:'auto'}},
          React.createElement('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12}},
            React.createElement('thead',null,
              React.createElement('tr',null,
                ['','Box','Atletas','Logs 30d','Usuarios 30d','Logs total','Última actividad'].map((h,i)=>
                  React.createElement('th',{key:i,style:th},h)
                )
              )
            ),
            React.createElement('tbody',null,
              filtered.map((b,i)=>
                React.createElement('tr',{key:i},
                  React.createElement('td',{style:{...td,width:14}},React.createElement(Dot,{sem:b.sem})),
                  React.createElement('td',{style:{...td,fontWeight:500}},b.name),
                  React.createElement('td',{style:td},b.atletas||React.createElement('span',{style:{color:C.muted}},'—')),
                  React.createElement('td',{style:{...td,color:b.logs_30d>0?C.text:C.muted}},b.logs_30d||'0'),
                  React.createElement('td',{style:td},b.users_30d||React.createElement('span',{style:{color:C.muted}},'0')),
                  React.createElement('td',{style:{...td,color:C.sub}},fmt(b.logs_total)||'0'),
                  React.createElement('td',{style:{...td,color:C.muted,fontSize:11}},fdate(b.last)),
                )
              )
            )
          )
        )
      ),

      React.createElement('div',{style:{textAlign:'right',fontSize:11,color:'#2A2927',marginTop:4}},'Crossmate · uso interno')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
