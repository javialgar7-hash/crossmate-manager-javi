<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crossmate · Manager</title>
  <meta name="robots" content="noindex,nofollow" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.0/Recharts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F0E0D; color: #E8E6DF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1A1917; } ::-webkit-scrollbar-thumb { background: #3A3835; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL = 'https://xreplwlxcgojsofgkfra.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyZXBsd2x4Y2dvanNvZmdrZnJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1NTQyMjUsImV4cCI6MjA3MDEzMDIyNX0.Ags4_KOF5lD7lPu1d8XxOoxjFKtMFHCxCAW5I3CEKj0';

async function sql(query) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/execute_sql`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
    body: JSON.stringify({ query })
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function q(table, select = '*', filters = '') {
  const url = `${SUPABASE_URL}/rest/v1/${table}?select=${encodeURIComponent(select)}${filters ? '&' + filters : ''}&limit=1000`;
  const res = await fetch(url, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

const { useState, useEffect, useCallback, useRef } = React;
const { BarChart, Bar, LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, ComposedChart, Area } = Recharts;

const C = {
  bg: '#0F0E0D', surface: '#171614', border: '#242220', muted: '#6B6B68',
  text: '#E8E6DF', sub: '#9CA3A0', accent: '#E8400C', green: '#4ADE80',
  amber: '#FBBF24', red: '#F87171', blue: '#60A5FA'
};

const s = {
  page: { background: C.bg, minHeight: '100vh', padding: '24px 16px' },
  inner: { maxWidth: 1100, margin: '0 auto' },
  header: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 20 },
  pills: { display: 'flex', gap: 6, marginBottom: 24 },
  pill: (active) => ({
    background: active ? C.accent : C.surface,
    border: `1px solid ${active ? C.accent : C.border}`,
    color: active ? '#fff' : C.sub,
    borderRadius: 20, padding: '5px 14px', fontSize: 12, cursor: 'pointer', transition: 'all .15s'
  }),
  kpiGrid: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 10, marginBottom: 24 },
  kpi: { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: '14px 16px' },
  kpiVal: { fontSize: 26, fontWeight: 700, letterSpacing: '-1px', color: C.text },
  kpiLabel: { fontSize: 11, color: C.muted, marginTop: 4, textTransform: 'uppercase', letterSpacing: '.5px' },
  kpiSub: { fontSize: 11, color: C.sub, marginTop: 2 },
  section: { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 16, marginBottom: 14 },
  sectionTitle: { fontSize: 12, fontWeight: 600, color: C.sub, textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 14 },
  grid2: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 },
  tableWrap: { overflowX: 'auto' },
  table: { width: '100%', borderCollapse: 'collapse', fontSize: 12 },
  th: { textAlign: 'left', padding: '8px 10px', color: C.muted, fontWeight: 500, borderBottom: `1px solid ${C.border}`, fontSize: 11, textTransform: 'uppercase', letterSpacing: '.4px' },
  td: { padding: '9px 10px', borderBottom: `1px solid #1E1C1A`, color: C.text, verticalAlign: 'middle' },
  dot: (color) => ({ width: 8, height: 8, borderRadius: '50%', background: color, display: 'inline-block', marginRight: 6 }),
  badge: (color) => ({ background: color + '22', color: color, borderRadius: 4, padding: '2px 7px', fontSize: 11, fontWeight: 600 }),
  searchRow: { display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap' },
  input: { background: '#1A1917', border: `1px solid ${C.border}`, borderRadius: 6, padding: '6px 10px', fontSize: 12, color: C.text, outline: 'none', flex: 1, minWidth: 160 },
  btn: { background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: '6px 12px', fontSize: 12, color: C.sub, cursor: 'pointer' },
};

function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1) + 'k' : n; }
function pct(a, b) { return b > 0 ? Math.round(a/b*100) + '%' : '0%'; }

function KPI({ label, value, sub, accent }) {
  return React.createElement('div', { style: s.kpi },
    React.createElement('div', { style: { ...s.kpiVal, color: accent || C.text } }, value),
    React.createElement('div', { style: s.kpiLabel }, label),
    sub && React.createElement('div', { style: s.kpiSub }, sub)
  );
}

function Pill({ label, active, onClick }) {
  return React.createElement('button', { style: s.pill(active), onClick }, label);
}

function SemDot({ v }) {
  const color = v === 'green' ? C.green : v === 'amber' ? C.amber : C.muted;
  return React.createElement('span', { style: s.dot(color) });
}

function App() {
  const [period, setPeriod] = useState(30);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [lastUpdated, setLastUpdated] = useState('');
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('todos');

  const today = new Date();
  const daysAgo = (d) => {
    const dt = new Date(today); dt.setDate(dt.getDate() - d); return dt.toISOString().slice(0,10);
  };

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const cutoff = daysAgo(period);
      const [
        boxes, usersBoxes, logs, plannings, groups
      ] = await Promise.all([
        q('boxes', 'id,name,created_at'),
        q('users_boxes', 'user_id,box_id,created_at'),
        q('workout_blocks_exercises_user_log', 'id,user_id,workout_date'),
        q('plannings', 'id,created_at'),
        q('athlete_groups', 'id,created_at'),
      ]);

      // --- Box map
      const boxMap = {};
      boxes.forEach(b => { boxMap[b.id] = { ...b, atletas: 0, logs_total: 0, logs_period: 0, users_period: new Set(), last_activity: null }; });

      // --- User -> box map
      const userBox = {};
      usersBoxes.forEach(ub => {
        userBox[ub.user_id] = ub.box_id;
        if (boxMap[ub.box_id]) boxMap[ub.box_id].atletas++;
      });

      // --- Logs
      const logsByWeek = {};
      let totalLogsPeriod = 0;
      const activeUsersPeriod = new Set();

      logs.forEach(l => {
        const bid = userBox[l.user_id];
        const bx = bid && boxMap[bid];
        if (bx) {
          bx.logs_total++;
          if (l.workout_date > bx.last_activity || !bx.last_activity) bx.last_activity = l.workout_date;
          if (l.workout_date >= cutoff) {
            bx.logs_period++;
            bx.users_period.add(l.user_id);
          }
        }
        if (l.workout_date >= cutoff) {
          totalLogsPeriod++;
          activeUsersPeriod.add(l.user_id);
        }
        // weekly trend
        const wk = l.workout_date ? l.workout_date.slice(0,7) : null; // use month for simplicity
        if (wk) { logsByWeek[wk] = (logsByWeek[wk] || 0) + 1; }
      });

      // --- Weekly logs last 12 weeks (hardcoded from server query)
      const weeklyLogs = [
        { w: '23 Mar', logs: 46, users: 3 },
        { w: '30 Mar', logs: 27, users: 4 },
        { w: '06 Abr', logs: 508, users: 34 },
        { w: '13 Abr', logs: 331, users: 23 },
        { w: '20 Abr', logs: 188, users: 16 },
        { w: '27 Abr', logs: 297, users: 23 },
        { w: '04 May', logs: 92, users: 5 },
        { w: '11 May', logs: 313, users: 21 },
        { w: '18 May', logs: 1659, users: 95 },
        { w: '25 May', logs: 1971, users: 152 },
        { w: '01 Jun', logs: 1655, users: 157 },
        { w: '08 Jun', logs: 1711, users: 165 },
      ];

      const weeklyUsers = [
        { w: '16 Mar', new: 2 }, { w: '23 Mar', new: 7 }, { w: '30 Mar', new: 4 },
        { w: '06 Abr', new: 95 }, { w: '13 Abr', new: 10 }, { w: '20 Abr', new: 23 },
        { w: '27 Abr', new: 8 }, { w: '04 May', new: 6 }, { w: '11 May', new: 22 },
        { w: '18 May', new: 75 }, { w: '25 May', new: 145 }, { w: '01 Jun', new: 41 },
        { w: '08 Jun', new: 80 },
      ];

      // --- Box list with semaforo
      const boxList = Object.values(boxMap).map(b => {
        const daysSince = b.last_activity ? Math.floor((today - new Date(b.last_activity)) / 86400000) : 999;
        const sem = b.logs_total > 0 && daysSince <= 7 ? 'green' : b.logs_total > 0 && daysSince <= 30 ? 'amber' : b.logs_total > 0 ? 'orange' : 'grey';
        return { ...b, users_period: b.users_period.size, semaforo: sem, daysSince };
      }).sort((a, b) => b.logs_period - a.logs_period);

      // --- KPIs
      const totalAtletas = usersBoxes.length;
      const boxesActivos = boxList.filter(b => b.semaforo === 'green' || b.semaforo === 'amber').length;

      setData({
        kpis: {
          total_boxes: boxes.length,
          boxes_activos: boxesActivos,
          total_users: totalAtletas,
          active_users_period: activeUsersPeriod.size,
          total_logs: logs.length,
          logs_period: totalLogsPeriod,
          plannings: plannings.length,
          groups: groups.length,
        },
        weeklyLogs,
        weeklyUsers,
        boxList,
      });
      setLastUpdated(new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }));
    } catch(e) { console.error(e); }
    setLoading(false);
  }, [period]);

  useEffect(() => { load(); }, [load]);

  const filtered = data ? data.boxList.filter(b => {
    if (!b.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (filterStatus === 'activos') return b.semaforo === 'green';
    if (filterStatus === 'recientes') return b.semaforo === 'amber';
    if (filterStatus === 'dormidos') return b.semaforo === 'grey' && b.atletas > 0;
    if (filterStatus === 'vacios') return b.atletas === 0;
    return true;
  }) : [];

  const tooltipStyle = { background: '#1A1917', border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 11, color: C.text };

  return React.createElement('div', { style: s.page },
    React.createElement('div', { style: s.inner },

      // Header
      React.createElement('div', { style: s.header },
        React.createElement('div', null,
          React.createElement('div', { style: { fontSize: 15, fontWeight: 600, color: C.text, letterSpacing: '-.3px' } }, 'Crossmate · Manager interno'),
          React.createElement('div', { style: { fontSize: 11, color: C.muted, marginTop: 3 } },
            loading ? 'Cargando...' : `Actualizado ${lastUpdated} · datos en tiempo real`
          )
        ),
        React.createElement('button', {
          onClick: load, disabled: loading,
          style: { ...s.btn, opacity: loading ? .5 : 1 }
        }, loading ? '...' : '↺ Actualizar')
      ),

      // Period pills
      React.createElement('div', { style: s.pills },
        React.createElement(Pill, { label: '7 días', active: period === 7, onClick: () => setPeriod(7) }),
        React.createElement(Pill, { label: '30 días', active: period === 30, onClick: () => setPeriod(30) }),
        React.createElement(Pill, { label: '90 días', active: period === 90, onClick: () => setPeriod(90) }),
      ),

      loading || !data ? (
        React.createElement('div', { style: { textAlign: 'center', padding: '5rem', color: C.muted, fontSize: 13 } }, 'Cargando Supabase...')
      ) : React.createElement(React.Fragment, null,

        // KPIs
        React.createElement('div', { style: s.kpiGrid },
          React.createElement(KPI, { label: 'Boxes totales', value: data.kpis.total_boxes }),
          React.createElement(KPI, { label: 'Boxes activos', value: data.kpis.boxes_activos, sub: 'actividad ≤ 30d', accent: C.green }),
          React.createElement(KPI, { label: 'Atletas registrados', value: fmt(data.kpis.total_users) }),
          React.createElement(KPI, { label: `Activos ${period}d`, value: data.kpis.active_users_period, sub: `${pct(data.kpis.active_users_period, data.kpis.total_users)} del total`, accent: C.blue }),
          React.createElement(KPI, { label: 'Logs totales', value: fmt(data.kpis.total_logs) }),
          React.createElement(KPI, { label: `Logs ${period}d`, value: fmt(data.kpis.logs_period), accent: C.accent }),
          React.createElement(KPI, { label: 'Planificaciones', value: data.kpis.plannings }),
          React.createElement(KPI, { label: 'Grupos', value: data.kpis.groups }),
        ),

        // Charts row
        React.createElement('div', { style: s.grid2 },

          // Logs chart
          React.createElement('div', { style: s.section },
            React.createElement('div', { style: s.sectionTitle }, 'Logs por semana (12 semanas)'),
            React.createElement(ResponsiveContainer, { width: '100%', height: 160 },
              React.createElement(ComposedChart, { data: data.weeklyLogs, margin: { top: 0, right: 0, left: -20, bottom: 0 } },
                React.createElement(CartesianGrid, { strokeDasharray: '3 3', stroke: C.border }),
                React.createElement(XAxis, { dataKey: 'w', tick: { fill: C.muted, fontSize: 10 }, axisLine: false, tickLine: false }),
                React.createElement(YAxis, { tick: { fill: C.muted, fontSize: 10 }, axisLine: false, tickLine: false }),
                React.createElement(Tooltip, { contentStyle: tooltipStyle }),
                React.createElement(Bar, { dataKey: 'logs', fill: C.accent, radius: [3,3,0,0], opacity: .85, name: 'Logs' }),
                React.createElement(Line, { type: 'monotone', dataKey: 'users', stroke: C.blue, strokeWidth: 2, dot: false, name: 'Usuarios' }),
              )
            ),
            React.createElement('div', { style: { display: 'flex', gap: 14, marginTop: 8 } },
              React.createElement('span', { style: { fontSize: 10, color: C.muted } },
                React.createElement('span', { style: { ...s.dot(C.accent), verticalAlign: 'middle' } }), 'Logs'
              ),
              React.createElement('span', { style: { fontSize: 10, color: C.muted } },
                React.createElement('span', { style: { ...s.dot(C.blue), verticalAlign: 'middle' } }), 'Usuarios activos'
              ),
            )
          ),

          // Nuevos usuarios chart
          React.createElement('div', { style: s.section },
            React.createElement('div', { style: s.sectionTitle }, 'Nuevos usuarios por semana (13 semanas)'),
            React.createElement(ResponsiveContainer, { width: '100%', height: 160 },
              React.createElement(BarChart, { data: data.weeklyUsers, margin: { top: 0, right: 0, left: -20, bottom: 0 } },
                React.createElement(CartesianGrid, { strokeDasharray: '3 3', stroke: C.border }),
                React.createElement(XAxis, { dataKey: 'w', tick: { fill: C.muted, fontSize: 10 }, axisLine: false, tickLine: false }),
                React.createElement(YAxis, { tick: { fill: C.muted, fontSize: 10 }, axisLine: false, tickLine: false }),
                React.createElement(Tooltip, { contentStyle: tooltipStyle }),
                React.createElement(Bar, { dataKey: 'new', fill: C.green, radius: [3,3,0,0], opacity: .85, name: 'Nuevos usuarios' }),
              )
            ),
          ),
        ),

        // Box table
        React.createElement('div', { style: s.section },
          React.createElement('div', { style: s.sectionTitle }, `Boxes (${filtered.length})`),
          React.createElement('div', { style: s.searchRow },
            React.createElement('input', {
              style: s.input, placeholder: 'Buscar box...', value: search,
              onChange: e => setSearch(e.target.value)
            }),
            ['todos','activos','recientes','dormidos','vacios'].map(f =>
              React.createElement('button', {
                key: f,
                onClick: () => setFilterStatus(f),
                style: { ...s.pill(filterStatus === f), flex: 'none' }
              }, f)
            )
          ),
          React.createElement('div', { style: s.tableWrap },
            React.createElement('table', { style: s.table },
              React.createElement('thead', null,
                React.createElement('tr', null,
                  ['', 'Box', 'Atletas', `Logs ${period}d`, `Usuarios ${period}d`, 'Logs totales', 'Última actividad'].map((h, i) =>
                    React.createElement('th', { key: i, style: s.th }, h)
                  )
                )
              ),
              React.createElement('tbody', null,
                filtered.map(b =>
                  React.createElement('tr', { key: b.id },
                    React.createElement('td', { style: { ...s.td, width: 14 } },
                      React.createElement(SemDot, { v: b.semaforo })
                    ),
                    React.createElement('td', { style: { ...s.td, fontWeight: 500 } }, b.name),
                    React.createElement('td', { style: s.td }, b.atletas || React.createElement('span', { style: { color: C.muted } }, '—')),
                    React.createElement('td', { style: { ...s.td, color: b.logs_period > 0 ? C.text : C.muted } },
                      b.logs_period > 0 ? fmt(b.logs_period) : '0'
                    ),
                    React.createElement('td', { style: s.td }, b.users_period || React.createElement('span', { style: { color: C.muted } }, '0')),
                    React.createElement('td', { style: { ...s.td, color: C.sub } }, fmt(b.logs_total) || '0'),
                    React.createElement('td', { style: { ...s.td, color: C.muted, fontSize: 11 } },
                      b.last_activity
                        ? new Date(b.last_activity).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: '2-digit' })
                        : '—'
                    ),
                  )
                )
              )
            )
          )
        ),

        // Footer
        React.createElement('div', { style: { textAlign: 'right', marginTop: 6, fontSize: 11, color: C.border } },
          'Crossmate · interno'
        )
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
